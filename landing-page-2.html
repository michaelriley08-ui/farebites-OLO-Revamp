<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FareBites</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
</head>

<body data-page="landing-page-2">
    <div class="workspace-container">
        <header class="workspace-header">
            <div class="flex items-center gap-6">
                <span
                    class="font-black text-red-500 tracking-tighter text-xl cursor-pointer hover:opacity-80 transition-opacity"
                    onclick="navigateTo('home')">
                    FAREBITES5 <span class="text-white font-light text-xs opacity-50 ml-1">v3.7.3 FINAL</span>
                </span>
                <div class="h-6 w-[1px] bg-gray-700 mx-2"></div>

                <!-- Restored Multi-Column Dropdown -->
                <div class="relative">
                    <button class="page-selector-btn" onclick="toggleMenu(event)">
                        <span id="current-page-label">FareBites Landing Page</span>
                        <i class="fa-solid fa-chevron-down text-[10px]"></i>
                    </button>
                    <div id="dropdown-menu">
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <button class="btn-toggle" id="btn-desktop" onclick="setViewport('desktop')"><i
                        class="fa-solid fa-desktop mr-2"></i>Desktop</button>
                <button class="btn-toggle active" id="btn-mobile" onclick="setViewport('mobile')"><i
                        class="fa-solid fa-mobile-screen mr-2"></i>Mobile</button>
                <button class="btn-toggle" id="btn-tablet" onclick="setViewport('tablet')"><i
                        class="fa-solid fa-tablet-screen-button mr-2"></i>Tablet</button>
            </div>
        </header>

        <main class="canvas-area" id="canvas">
            <div id="preview-wrapper" class="preview-container view-mobile">
                <div id="app-viewport" class="app-content">
                    <!-- App logic renders views here -->
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
